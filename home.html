<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind and DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- styles -->
    <style>
      .geist-font {
        font-family: "Geist", sans-serif;
      }
    </style>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/github-logo.png" />

    <!-- Fontawesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>GitHub Issues Tracker | Home Page</title>
  </head>

  <body>
    <!-- Nav bar -->
    <nav>
      <div class="navbar bg-base-100 shadow-sm flex justify-between px-12 py-5">
        <div class="flex gap-2">
          <img
            class="inline-block w-9 h-9"
            src="assets/github-logo.png"
            alt=""
          />
          <a class="text-2xl font-semibold text-[#1F2937]"
            >GitHub Issues Tracker</a
          >
        </div>

        <div class="flex gap-5">
          <label class="input input-bordered flex items-center gap-2">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="grow" placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary text-lg font-semibold">
            + New Issue
          </button>
        </div>
      </div>
    </nav>

    <section class="mt-6 w-11/12 mx-auto py-12">
      <!-- home page Button -->
      <div class="p-6 shadow-md rounded-xl space-x-3">
        <button class="btn btn-primary px-3">All</button>
        <button class="btn btn-primary">Open</button>
        <button class="btn btn-primary">Closed</button>
      </div>

      <!-- Issue count -->
      <div class="p-6 flex justify-between shadow-md mt-8 rounded-t-2xl">
        <div class="flex gap-3">
          <img
            class="bg-[#ECE4FF] p-2 rounded-full w-[50px] h-[50px]"
            src="assets/Aperture.png"
            alt=""
          />
          <h2>
            <span class="text-xl font-semibold text-[#1F2937]">50 Issues</span>
            <br />
            <span class="text-[#64748B] text-lg font-normal"
              >Track and manage your project issues</span
            >
          </h2>
        </div>
        <div class="flex gap-3">
          <p><i class="fa-solid fa-circle text-[#00A96E]"></i>Open</p>
          <p><i class="fa-solid fa-circle text-[#A855F7]"></i>Closed</p>
        </div>
      </div>

      <!-- Card container -->

      <div
        id="card-data-container"
        class="mt-1 shadow-md p-10 grid grid-cols-3 rounded-sm gap-10"
      ></div>
    </section>

    <script src="script/home.js"></script>
  </body>
</html>
