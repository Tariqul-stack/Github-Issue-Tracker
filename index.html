<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind and DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- styles -->
    <style>
      .geist-font {
        font-family: "Geist", sans-serif;
      }
    </style>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/github-logo.png" />

    <title>GitHub Issues Tracker</title>
  </head>

  <body class="geist-font">
    <!-- Login Form -->
    <section class="mt-8">
      <div class="w-4/12 mx-auto shadow-xl text-center py-5 px-5 rounded-lg">
        <img class="mx-auto" src="assets/github-logo.png" alt="" />
        <h2 class="text-3xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-lg font-normal text-[#64748B]">
          Sign in to manage your issues
        </p>
        <fieldset
          class="fieldset border-base-300 rounded-box border p-4 mt-10 space-y-3"
        >
          <label class="label text-[#1F2937] text-lg font-medium"
            >Username</label
          >
          <input
            id="usernameInput"
            type="email"
            class="p-3 rounded-sm text-lg font-normal"
            placeholder="Enter Username"
          />

          <label class="label text-[#1F2937] text-lg font-medium"
            >Password</label
          >
          <input
            id="passwordInput"
            type="password"
            class="p-3 rounded-sm text-lg font-normal"
            placeholder="Enter Password"
          />

          <button id="sign-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>

        <div class="mt-5">
          <span><hr /></span>
          <p>or</p>
          <span><hr /></span>
        </div>
        <div class="mt-5">
          <p>Demo Credentials:</p>
          <p class="p-6 bg-[#F8FAFC] rounded-sm mt-3">
            Username: admin <br />
            Password: admin123
          </p>
        </div>
      </div>
    </section>
    <script src="script/app.js"></script>
  </body>
</html>
